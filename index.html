<script>
const templates=[
  "蛙泳私教课体验太棒了！我是完全的零基础，以前下水就紧张，连脸都不敢埋进水里。教练特别有耐心，第一节课没有急着教动作，而是先带我适应水环境，练习憋气和漂浮。这个基础打得特别好，后面学起来就顺利多了。蛙泳腿的收翻蹬夹动作教练分解成好几个步骤一步步教，每个步骤都练熟了再进行下一步。现在我已经能连续游25米了，虽然速度不快但动作很标准。教练说蛙泳最重要的是节奏感不能急，慢慢来反而进步更快。每次上课教练都会在旁边跟着游随时纠正动作，安全感满满。想学游泳的朋友真的推荐从蛙泳开始，找对教练很关键！",
  "自由泳私教课让我彻底爱上了游泳！之前自学过自由泳但游不了多远就喘得不行，而且胳膊酸得要命。教练一看就说我的问题在于呼吸节奏不对和划水效率太低。呼吸方面教了我侧身转头吸气而不是抬头吸气，这个改变让换气变得轻松太多了。划水方面纠正了我的高肘抱水动作，说要用身体的核心力量带动手臂而不是光靠肩膀发力。调整后同样游50米消耗的体力少了一半都不止。现在我能连续游200米自由泳了这在以前根本不敢想。教练还教了如何分配体力和控制配速，这些细节真的只有专业教练才能指点出来。强烈推荐给想学好自由泳的人！",
  "儿童游泳私教课必须点赞！给我家6岁的儿子报了游泳私教课，选的是一对一教学。教练对小朋友特别有办法，训练内容都设计成了小游戏的形式，孩子在玩的过程中就把游泳学会了。比如练习腿部动作时会用踢水比赛看谁踢出的水花大，练习呼吸时会用吹泡泡游戏让孩子不害怕呛水。我儿子本来有点怕水的，上了三四节课后就完全不怕了现在最喜欢的事情就是去上游泳课。教练还会及时跟家长沟通孩子的进度和需要注意的问题。一个半月下来孩子已经学会了蛙泳能独立游15米左右。这种专业的儿童游泳教学真的比大班课有效太多，安全又有保障！",
  "蝶泳私教课挑战成功！蝶泳一直是我最想学会的泳姿看起来太帅了但也确实是最难的。之前自己瞎练过结果腰酸背疼还游不动。教练说蝶泳的关键在于波浪传导和两次打腿一次划水的配合节奏，不是靠蛮力扑腾。前几节课主要练胸压和鞭状打腿这两个基础，教练说这两个没做好学蝶泳就是自讨苦吃。大概练了六七节课才开始加入划水和呼吸配合。过程确实不容易中间有好几次想放弃但教练一直在鼓励说蝶泳一旦学会就会成为最好看的泳姿。现在我终于能连贯地游25米蝶泳了虽然还不够优美但已经很有成就感了。想学蝶泳的朋友一定要找专业教练别自己瞎练容易受伤！",
  "仰泳私教课是放松身心的好选择！我学游泳的主要目的是想找一个低冲击的有氧运动来保护膝盖（跑步跑坏了）。教练推荐我从仰泳开始因为仰泳对关节压力最小而且还能改善体态。学习过程中发现仰泳看起来简单其实有很多技术要点。比如身体的滚动而不是平躺在水面上划水，比如入水角度不对会导致身体偏移方向。教练会拿浮板辅助练习让我先感受正确的身体位置。仰泳最大的好处是脸部始终露出水面不用担心呼吸问题可以专注于动作本身。现在我每次游完仰泳都觉得全身舒展特别放松肩颈酸痛也缓解了不少。推荐给有关节问题或者想要放松型运动的朋友！",
  "成人零基础游泳速成班效果惊人！我28岁了还不会游泳觉得很丢人所以下定决心一定要学会。报了这里的私教课说是大部分学员十节课左右就能学会一种泳姿。教练先评估了我的水性发现我虽然怕水但身体协调性还不错于是建议从蛙泳开始学。每节课一小时内容安排得很紧凑：10分钟热身复习、40分钟新内容学习、10分钟放松总结。教练的教学方法很科学不是那种填鸭式的而是确保每个环节都真正掌握了才进入下一个。第八节课的时候我突然发现自己能独立游起来了那种感觉真的太棒了！现在蛙泳已经比较熟练了准备开始学自由泳。成年人学游泳一点都不晚关键是要找对方法和对的教练！",
  "自由泳进阶课程提升显著！我的自由泳能游但游得很慢而且姿势很难看像是在水里挣扎。教练做了视频分析指出了几个核心问题：身体过于垂直导致阻力大、划水路线太短没有充分推水、打腿频率太慢导致下半身下沉。针对这些问题制定了改进计划。前两周专门练身体姿态的流线型和打腿技术用了浮板和脚蹼辅助；第三四周重点练高肘抓水和加速推水；最后两周整合所有技术配合呼吸节奏。六周后的对比视频变化真的很明显身体更平了划水更有力了速度也快了将近一倍。原来自由泳看似简单的动作里有这么多门道专业指导真的必不可少！",
  "蛙泳纠正常常被忽视但很重要！很多人觉得蛙泳最容易学不需要教练教但我的经验恰恰相反。我自己学了两年蛙泳动作全是错的养成了很多坏习惯：抬头换气导致下半身下沉、划水太宽浪费体力、蹬腿没有翻脚掌导致推进力不足。教练花了好几节课专门帮我改这些错误动作比从头学还费劲所以说初学时找教练真的能少走弯路。纠正后同样游100米省力太多了速度也快了不少。教练还说正确的蛙泳对膝关节的压力更小错误的蛙姿反而容易伤膝盖。如果你也是自学蛙泳的建议找教练看看动作是否标准小问题可能影响很大！",
  "游泳私教课的转身技术训练！能游一段距离后我开始学习转身技术这是游泳中技术含量最高的部分之一。教练先教了蛙泳的触壁转身和自由泳的滚翻转身两种。滚翻转身看着简单做起来真难要在高速游进的过程中完成团身翻转然后脚蹬池壁出发全程一气呵成。教练把动作拆解成：接近池壁时的最后几次划水→前滚翻→转体→脚触壁→蹬离→滑行→起泳每个环节单独练习后再串联起来。练了大概四五次终于完成了第一次完整的滚翻转身当时激动得差点呛水哈哈。转身技术能让长距离游泳节省大量时间和体力想在游泳上有更高追求的话这项技术必须掌握！",
  "游泳私教课的安全教育值得称赞！给孩子报游泳课最关心的就是安全问题。这家的安全意识真的让我非常放心。第一节课教练就花了很长时间讲水上安全知识：如何正确穿戴救生设备、遇到抽筋怎么办、溺水时如何自救和呼救、在水里碰撞受伤怎么处理等等。每次下水前都会检查水温水质确认环境安全。教学过程中教练始终保持在孩子一臂距离以内确保随时能提供帮助。孩子学的自救技能包括踩水（能在水中保持头部露出水面30秒以上）、仰漂（能仰面漂浮休息）、以及抓住岸边或浮具的方法。这些技能可能一辈子用不上但万一用到就是救命的本事。安全教育这块他们做得真的很好！",
  "自由泳的呼吸技术突破！自由泳最难的就是呼吸这点我相信所有学自由泳的人都有共鸣。我之前的问题是换气时头抬得太高导致下半身下沉而且喝水喝到怀疑人生。教练教了一个很关键的技巧：换气时想象自己是转动身体而不是转头身体转动了头自然就跟过来了同时一只眼睛可以看水下另一只看水面。还有一个重点是呼气要在水下完成出水口的瞬间只做快速吸气不要试图又呼又吸。配合上打腿节奏两腿各打三次水换一次气（六次腿一呼吸）找到节奏后换气变得自然多了不再是一个令人生畏的障碍。呼吸问题解决后自由泳的学习进度一下子就加快了！",
  "蝶泳的身体波浪技术详解！前面提到我在学蝶泳这里详细说说身体波浪这个核心技术。教练说蝶泳不是靠手臂往下压水而是靠胸部的起伏带动身体形成波浪式前进就像海豚一样。具体做法是：胸部下压→臀部上提→大腿下压→小腿和脚面顺势向上鞭打→整个身体形成一个S形的波浪传导。听起来复杂但教练用了很多辅助练习来帮助体会：站在水中练习胸压和臀提的动作、趴在岸上练习波浪传导、用浮板固定上半身单独练习鞭状打腿。当第一次感受到身体波浪推动身体向前的那一刻真的太神奇了那种顺滑的前进感跟蛮力划水完全是两个概念。蝶泳真的是艺术与力量的完美结合！",
  "仰泳的手臂入水角度纠正！仰泳游不直是我的一个大问题总是游着游着就偏离方向了有时候甚至会撞到泳道线。教练分析原因主要是手臂入水角度不对和小拇指先入水的技术细节没做好。正确的小拇指入水要求手掌外旋约45度小指尖先接触水面然后手臂沿着身体中线向后划水。如果入水角度偏外就会产生向外的分力导致身体偏移。教练让我对着镜子练习陆上的模仿动作找到正确的入水感觉再到水里实践。同时还强调了身体的滚动配合——划水时同侧肩膀稍微下沉这样能增加划水的幅度和力量。纠正后仰泳终于能游直线了方向感好了很多！",
  "游泳私教课的出发台技术！在掌握了基本泳姿后我开始学习出发台出发技术。这是竞技游泳的重要组成部分一个好的出发能为整趟游泳争取很大的优势。教练教的出发流程是：站上出发台→双手握住前沿→弯腰屈膝重心前移→听到信号后用力蹬腿→身体腾空→手先入水→身体呈流线型滑行→开始打腿划水。每个环节都有技术要点：蹬腿要用力且角度正确45度左右最佳；腾空时身体要绷紧呈流线型减少空气阻力；入水时要远要深但不能过深以免损失太多时间。练习跳发真的很有趣每次跃入水中的感觉都很爽。虽然我不用参加比赛但学会出发技术让游泳变得更完整也更有趣了！",
  "蛙泳的划水路线优化！我的蛙泳划水一直是宽而平的教练说这样不仅费力而且推进效率低。正确的蛙泳划水应该是：双手前伸→向外下方划水至肩宽略宽→向内收手至胸前→向前伸出。关键是划水阶段要有一定的向下分量帮助上身抬起为换气创造条件收手阶段要快速以减少减速。教练让我用手掌对着池壁感受不同划水路线的阻力差异很快就理解了为什么窄而深的划水更好。改变划水路线后最直观的感受是游得更快了而且不那么累了因为每一划都更有效率。蛙泳看似简单实际上每个细节都有讲究这就是为什么需要专业教练来指导！",
  "自由泳的两点打腿vs六点打腿！教练根据我的训练目标介绍了不同的打腿频率策略。两点打腿（每划两次水打一次腿）适合长距离省力游节奏是划右手时打左腿划左手时打右腿；六点打腿（每划水两次打六次腿即三次右腿三次左腿）适合中短距离速度更快但对体能要求更高。作为健身目的我主要练习两点打腿配合交叉型的划水节奏这种节奏游起来很舒服可以游很久不累。偶尔也会练练六点打腿提升一下心肺功能。了解不同的打腿策略让我对自由泳有了更深层的认识不再是机械地重复动作而是可以根据需求调整技术。这种知识的传授体现了教练的专业水准！",
  "仰泳的打腿和水感培养！仰泳的打腿要求膝盖微屈脚面绷直用大腿带动小腿上下交替鞭打水面。我一开始的问题是大腿没动只是小腿在上下拍打水面溅起很大的水花但推进力很小。教练说这叫"锄头腿"是仰泳新手最常见的错误之一。纠正方法是想象用脚跟去碰水面以上的某个目标迫使髋关节参与运动。另一个练习是用脚趾去夹住水面上的浮板边缘迫使用脚面而不是脚跟去打水。经过反复练习终于找到了用大腿带动的感觉水花变小了但推进力明显增大了。水感的培养需要时间但一旦找到感觉后仰泳就变得轻松愉快了！",
  "游泳私教课的耐力训练计划！在掌握了基本的泳姿技术后教练为我制定了耐力训练计划目标是能够连续游1000米。计划采用渐进式超负荷的原则：第一周连续游200米（4×50米间歇）、第二周400米（8×50米）、第三周600米（3×200米）、第四周800米（4×200米）、第五周1000米（2×500米或连续1000米）。每次训练都会记录时间和心率监控强度是否合适。间歇训练时休息时间逐渐缩短从最初的60秒缩短到30秒再到15秒。这个过程大概持续了一个半月当我第一次完整连续游完1000米自由泳时那种成就感无与伦比。耐力是游泳的基础有了耐力基础后学习其他技术和提升速度都更容易了。",
  "蝶泳的节奏配合训练！蝶泳最难的部分除了身体波浪就是两次打腿一次划水的节奏配合。教练用口诀帮我记忆："划一下打两下——1234"。具体来说：第一次打腿发生在手入水前瞬间帮助臀部上提为接下来的胸压做准备；第二次打腿发生在手推水结束时帮助臀部再次上提进入下一次循环。这个节奏一旦找准了蝶泳就变得顺畅了很多不再那么累。教练还强调蝶泳的节奏不应该太快要找到适合自己的频率有些人的自然节奏快些有些人慢些关键是保持稳定。我用节拍器辅助练习了几次后找到了自己的节奏现在蝶泳能连续游50米了虽然还很累但至少能游下来了！",
  "蛙泳的出发和触壁技巧！在泳池中游泳出发和每次来回的触壁转身都是重要的技术环节。蛙泳的出发和其他泳姿一样从出发台跳入水中但入水后的水下动作有所不同：蛙泳规则允许出发后在水下做一次长划水和一次蛙泳腿然后出水面的第一次划水。这个水下动作如果能做好可以获得很大的初始速度。教练带着我反复练习了这个水下蛙泳腿加长划水的组合。触壁方面蛙泳要求双手同时触壁不能一前一后。教练教了如何准确判断距离提前准备触壁动作以及在触壁后迅速转身蹬壁出发的整套流程。这些细节技术让游泳变得更加专业和高效！",
  "自由泳的划频和划幅平衡！教练介绍了一个很重要的概念：游泳速度=划频×划幅。划频是每分钟划水的次数划幅是每次划水前进的距离。要提高速度可以从提高划频或增加划幅或者两者兼顾入手。通过视频分析我的数据发现我的划频偏高但划幅偏短说明我在"忙忙碌碌"地划水但每次划水的效率不高。于是训练重点转向增加划幅：加强推水阶段的充分性确保每次划水都推到大腿外侧、改善身体姿态减少阻力、增强核心力量维持更好的流线型。调整后同样的速度下我的划频降低了说明每次划水的效率提高了这样游起来更省力也更持久。理解这个原理对提升游泳水平非常有帮助！",
  "仰泳的水线和定位！仰泳的一个独特挑战是你看不到前方只能靠感觉来判断方向和位置。教练教了几个实用的技巧：一是看天花板或泳池两侧的标记线来保持直线；二是利用泳道线的颜色变化来判断距离（一般泳道线末端会有不同颜色的标记）；三是通过划水时手的触感来判断是否偏离中心（如果一边总能摸到泳道线说明偏向那边了）。还有一个重要技巧是数划次数来估算距离比如我知道游25米大约需要18-20划这样可以判断什么时候该触壁了。这些实用的小技巧让仰泳变得不再那么让人心里没底。学会仰泳后我真的觉得它是最放松的泳姿尤其适合夏天在户外泳池仰着晒太阳游哈哈！",
  "儿童游泳的趣味教学法！我家女儿7岁报了游泳私教课。教练的教学方法真的很有创意把各种技术动作融入游戏中。比如学蛙泳腿时玩"青蛙过河"的游戏让孩子蹲在岸边模仿青蛙跳跃入水；学自由泳打腿时拿着浮板比赛谁先游到对面；学仰漂时玩"睡莲花"的游戏让孩子仰面漂浮假装是一朵水莲花。孩子每次上完课都意犹未尽回家还会主动练习踢水动作。教练还会给表现好的孩子贴小星星奖励积累到一定数量可以兑换小礼物。这种正向激励的方式让孩子对游泳产生了浓厚的兴趣。两个月下来女儿已经学会了蛙泳和自由泳打水正在学习完整的自由泳配合。寓教于乐的教学方式对孩子来说真的太重要了！",
  "游泳私教课的柔韧性训练！游泳看起来对柔韧性要求不高但实际上良好的柔韧性可以让你的泳姿更高效也更美观。教练在我的训练中加入了一些针对性的柔韧练习：肩关节灵活性训练（因为自由泳和仰泳需要大幅度的肩部旋转）、踝关节背屈训练（脚面绷直能减少打腿的阻力）、髋关节活动度训练（蛙泳蹬腿需要良好的髋关节外展能力）。每个练习只需要几分钟但在每次训练前后坚持做效果很明显。肩部灵活后自由泳的高肘抓水更容易做到位了；踝关节灵活后打腿的推进力增强了；髋关节灵活后蛙泳蹬腿的距离更远了。柔韧性训练是游泳中被很多人忽视的环节但它真的能带来实实在在的提升！",
  "蝶泳的上肢力量辅助训练！蝶泳对上肢力量尤其是推水阶段的力量要求很高。教练说如果上肢力量不够蝶泳就会出现"塌腰"现象也就是推水无力导致下半身下沉。为此在水中训练之外还加入了一些陆地上的辅助训练：俯卧撑（标准→钻石→爆发力）、弹力带划船模拟（模仿蝶泳的水下划水动作）、药球砸地（发展爆发性的推力）。这些辅助训练每周做一到两次每次20分钟左右。一个月后回到水里明显感觉推水更有力了身体位置也更高了水面的波浪更明显了。蝶泳真的是一项对综合素质要求很高的泳姿力量、柔韧、协调缺一不可。系统性的训练才能让你真正掌握它！",
  "蛙泳的呼吸时机优化！蛙泳呼吸的时机很有讲究。我之前的习惯是划水就开始抬头导致划水行程变短而且过早抬头增加了阻力。教练纠正说正确的时机应该是：划水阶段手向内收时开始抬头（利用收手的惯性帮助上身抬起）→手向前伸时低头入水→在双手即将伸直的瞬间开始蹬腿→蹬腿过程中身体呈流线型滑行。这个节奏可以用"划吸蹬漂"四个字来概括。调整呼吸时机后最直接的感受是游起来更流畅了不会有那种停顿顿挫的感觉而且因为划水更完整了推进力也增强了。蛙泳的每个环节都是紧密衔接的任何一个环节出问题都会影响整体效率专业教练的价值就在于此！",
  "自由泳的身体转动训练！自由泳不是平趴在水面上游的而是围绕身体纵轴进行左右转动的。这个转动是自由泳的核心技术之一但很多自学者都忽略了包括以前的我。教练说身体转动的好处包括：减少正面迎水面积从而降低阻力、让背部的大肌群参与到划水中增加力量、便于侧身换气。练习方法包括：站立在浅水区模仿转体划水动作、单臂划水练习（一只臂放在体侧另一只臂正常划水强迫身体转动）、前面提到的滚翻转身也能很好地锻炼转体感觉。当我真正体会到身体转动带动划水的感觉后自由泳变得轻松太多了肩膀也不那么酸了因为负担分散到了背部更大的肌肉群上。这个技术的改变对我来说是革命性的！",
  "仰泳的后仰心理克服！学仰泳最大的障碍其实不是技术而是心理——敢不敢把头放进水里后仰过去相信水会托住你。我一开始真的做不到总觉得自己会沉下去或者水会灌进鼻子里。教练用了几个方法帮我克服：第一步是在浅水区靠着池壁练习后仰让身体慢慢沉入水中感受浮力；第二步是教练托着我的后脑勺让我尝试放开手；第三步是戴着鼻夹练习消除呛水的恐惧；第四步是练习踢水产生前进动力后自然就更不容易下沉了。整个过程大概花了三节课当我终于能放心地仰漂在水面上看着天花板时那种自由的感觉太美妙了。如果你也有仰泳恐惧症请相信水一定会托住你你需要的只是一点点时间和信任！",
  "游泳私教课的公开水域适应性训练！夏天到了我想去海边或者开放水域游泳但知道泳池和公开水域是很不一样的。教练专门安排了一次公开水域适应性训练课程。内容包括：在不太平静的水面中保持方向（没有泳道线作参考）、应对水浪和涌动（浪来了该如何呼吸和调整）、水温和水质的适应（公开水域通常更冷也更浑浊）、以及最重要的安全注意事项（不要独自下水、了解潮汐和水流、穿着醒色的泳帽等）。我们在一个模拟公开水域的环境中进行了一些练习虽然和真正的海洋还是有差别但至少心里有底了。教练说公开水域游泳最好结伴而行并且要告知岸上的人你的计划。安全永远是第一位的无论你游得多好！",
  "蛙泳的蹬腿脚型纠正！蛙泳蹬腿有一个关键技术叫"翻脚掌"也就是在蹬腿之前脚尖外展脚心朝向外侧后方这样才能形成有效的蹬水面。我一直做不好这个动作蹬腿时脚面是正的对水的推进力很小。教练说这是因为踝关节灵活性不够加上长期穿鞋导致脚踝的活动范围受限。针对性练习包括：坐在地上用手扳脚尖做外展拉伸、跪姿脚背下压拉伸小腿前侧、以及在水中用手辅助脚掌外翻后做蹬腿动作。每天坚持练习踝关节灵活性两周后翻脚掌的动作终于能做到位了。蹬腿的效果立竿见影——同样的力气蹬出去感觉身体往前窜了一大截。细节决定成败这句话在蛙泳身上体现得淋漓尽致！",
  "自由泳的划水深度和路线！自由泳的划水应该有多深？划水路线应该走什么样的轨迹？这些问题的答案直接影响你的游泳效率。教练说理想的划水路线应该是：入水后在身体前方适当深度（不要太浅也不要太深）→向外下方抓水至肩宽位置→向后内方拉水至腹部下方→向后上方推水至大腿外侧→出水。整个路线近似一个"S"形或者说螺旋形而不是直来直去的直线。划水深度方面入水不宜过深否则会增加阻力也不宜过浅否则抓不到足够的水来推。通过水下摄像回放我看到了自己划水路线的问题并进行了针对性调整。调整后每次划水的推进感明显增强了速度测试也提升了十几秒。技术细节真的太重要了！",
  "蝶泳的恢复性训练！蝶泳是一项高强度运动训练后恢复很重要。教练教了一套蝶泳专用的恢复流程：训练结束后先慢游一圈自由泳或仰泳帮助乳酸代谢→然后在水中做5-10分钟的轻度拉伸重点拉伸胸部、肩部和下背部（这三个部位在蝶泳中负荷最大）→上岸后补充水分和适量的碳水化合物→当天避免再做上肢力量训练给肌肉充分的恢复时间。此外教练还建议蝶泳训练频率不要太高每周1-2次就够了中间穿插其他泳姿的训练避免过度使用相同的肌群。这套恢复方案让我在蝶泳训练后第二天的肌肉酸痛减轻了很多训练质量也因此保持了稳定。会练也要会恢复这才是成熟的运动者！",
  "游泳私教课的赛前准备训练！虽然我只是业余爱好者但教练还是帮我准备了一场小型的游泳友谊赛。赛前训练内容包括：出发技术的强化练习确保出发反应速度快且入水角度正确→转身技术的反复练习确保比赛中转身不掉速度→配速策略的训练前50米用80%的力量保持预留后程冲刺的体力→赛前一周的减量训练减少训练量让身体达到最佳状态。比赛那天虽然紧张但平时的训练让我发挥得很稳定100米自由泳游出了个人最好成绩1分38秒。虽然离专业选手差很远但对自己来说已经是巨大的进步了。有一个目标并为之努力训练的过程真的很有意义不管最终成绩如何！",
  "仰泳的划水深度和入水角度！仰泳的划水看起来和自由泳对称但其实有一些独特的要点。教练说仰泳划水的一个重要原则是小臂要尽量垂直于水面也就是说入水后要向下压到足够的深度才能开始有效的划水。很多新手入水太浅在水面上"挠"水看起来很忙但没什么推进力。入水角度方面小拇指先入水后手掌稍向外旋转大约30-45度这样能更好地抓水。还有一个要点是推水阶段要推到大腿外侧甚至更深而不是提早出水。通过在浅水区观察自己的水下气泡轨迹我调整了划水深度和角度后仰泳的速度明显提升了。仰泳真的是一门精巧的技术每个细节都值得琢磨！",
  "蛙泳的滑行阶段利用！蛙泳和其他泳姿最大的区别在于它有明显的滑行阶段——蹬腿结束后身体呈流线型在水下向前滑行直到速度降低到一定程度再开始下一次划水。很多初学者急于开始下一次划水忽略了滑行阶段白白浪费了蹬腿获得的动能。教练教我如何充分利用滑行：蹬腿结束后双腿并拢伸直脚面绷紧双臂夹紧耳朵→感受前进的速度→等速度降到大约最高速的70%时再开始下一次划水。这个节奏需要一些时间去体会但一旦掌握后发现蛙泳变得轻松太多了因为滑行阶段是完全不费力的"免费"前进。合理利用滑行是蛙泳高效游进的关键也是区分业余和专业的重要标志之一！",
  "自由泳的中交叉vs前交叉！自由泳的划水 timing 有两种主流风格：前交叉（一手入水时另一手刚好在前方伸展准备入水）和中交叉（一手入水时另一手已经划到腹部附近）。教练说两种各有优缺点：前交叉更省力适合长距离和初学者因为有一只手始终在前方伸展有利于身体平衡和流线型；中交叉速度更快适合中短距离因为保持了更持续的推进力但耗氧量更大。作为初学者我先从前交叉开始练习建立了良好的平衡感和节奏感后再逐步过渡到中交叉来提升速度。了解这两种风格的差异让我对自由泳有了更全面的认识也能根据自己的状态选择合适的策略。知识就是力量哪怕是在游泳池里！",
  "蝶泳的常见错误纠正汇总！学蝶泳的过程中我犯过的错误简直可以写一本书。教练帮我总结了最常见的几个错误及纠正方法：1) 胸压不够导致下半身沉——多做陆上的波浪传导练习体会胸口下压臀部上提的感觉；2) 打腿不是鞭状而是上下拍水——强调膝盖微屈脚面绷直用大腿带小腿；3) 划水太宽——手入水时应与肩同宽或略宽于肩不要过度外展；4) 呼吸时机不对——应在推水阶段抬头而非划水阶段；5) 节奏太快——用口诀或节拍器放慢节奏找到适合自己的频率。每一个错误都需要时间和耐心去纠正但只要方向对了进步就是迟早的事。学蝶泳的过程虽然痛苦但收获也是最大的当你终于能优雅地游出蝶泳时一切都值了！",
  "游泳私教课的综合训练计划！在掌握了四种泳姿的基本技术后教练为我制定了一份综合训练计划全面提升游泳能力。每周训练三次每次约75分钟包含：热身（200米混合泳慢游）、主训练（轮流侧重不同泳姿和技术环节）、副训练（与主训练互补的泳姿或技术）、放松（200米慢游加拉伸）。每个月还会安排一次长距离耐力游（1500-2000米）和一次速度训练（多组25米或50米冲刺）。训练计划每四周为一个周期会根据进展进行调整。三个月后的对比测试显示四种泳姿的成绩都有提升其中自由泳100米从2分05秒提升到1分42秒蛙泳100米从2分20秒提升到1分58秒。系统的训练计划带来的进步是全方位的！",
  "儿童游泳的进阶课程！女儿学会了基本的蛙泳和自由泳后进入了进阶阶段。课程内容包括：泳姿 refinement（细化每种泳姿的技术细节）、出发和转身技术的基础版本（简化版的出发台出发和触壁转身）、以及水上安全和自救能力的进一步提升（踩水一分钟以上、多种泳姿的仰漂、穿着衣物游泳模拟意外落水的情况）。教练对儿童的进阶教学依然保持着趣味性的同时逐步增加技术含量。比如学转身时会玩"弹簧人"游戏让孩子体验蹬壁反弹的感觉；学出发时会玩"火箭发射"比赛看谁入水最远。女儿现在已经能游三种泳姿了（蛙泳、自由泳、仰泳）正在学蝶泳的基础动作。看到她在水里的自信和快乐作为家长真的很欣慰！",

let currentText='';
let count=0;
function generate(){
  const t=templates[Math.floor(Math.random()*templates.length)];
  currentText=t;
  document.getElementById('resultArea').innerHTML='<div class="result-text">'+t+'</div>';
  count++;
  document.getElementById('count').textContent=count;
}
function clearResult(){
  currentText='';
  document.getElementById('resultArea').innerHTML='<div class="placeholder">点击"生成好评"按钮开始</div>';
}
function copyText(){
  if(!currentText){showToast('请先生成好评');return;}
  navigator.clipboard.writeText(currentText).then(()=>{
    showToast('已复制到剪贴板！');
    document.getElementById('copyBtn').classList.add('copied');
    document.getElementById('copyBtn').textContent='✅ 已复制';
    setTimeout(()=>{
      document.getElementById('copyBtn').classList.remove('copied');
      document.getElementById('copyBtn').textContent='📋 一键复制';
    },2000);
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
