<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游泳私教好评生成器</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',PingFang SC,Hiragino Sans,'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#00c6ff 0%,#0072ff 100%);min-height:100vh;margin:0;display:flex;justify-content:center;align-items:center;padding:20px}
.container{max-width:420px;width:100%;background:rgba(255,255,255,0.95);border-radius:20px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.header{text-align:center;margin-bottom:25px}
.icon{font-size:48px;margin-bottom:10px}
.title{font-size:24px;font-weight:700;color:#333;margin-bottom:5px}
.subtitle{font-size:14px;color:#666}
.result-area{background:#f8f9fa;border-radius:12px;padding:20px;min-height:120px;margin-bottom:20px;border:2px dashed #ddd}
.result-text{font-size:15px;line-height:1.8;color:#333;white-space:pre-wrap}
.placeholder{color:#999;text-align:center;padding:40px 20px}
.btn-row{display:flex;gap:10px;margin-bottom:15px}
.btn{flex:1;padding:14px 10px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,114,255,0.4)}
.btn-secondary{background:#e9ecef;color:#495057}
.btn-copy{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;width:100%;margin-top:10px}
.btn-copy.copied{background:linear-gradient(135deg,#11998e,#38ef7d)}
.stats{display:flex;justify-content:center;gap:30px;padding:15px 0;font-size:13px;color:#666}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:15px 30px;border-radius:10px;font-size:16px;opacity:0;pointer-events:none;transition:0.3s;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🏊</div>
    <div class="title">游泳私教好评生成器</div>
    <div class="subtitle">蛙泳·自由泳·仰泳·蝶泳·全泳姿</div>
  </div>
  <div class="result-area" id="resultArea">
    <div class="placeholder">点击"生成好评"按钮开始</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="generate()">🎲 生成好评</button>
    <button class="btn btn-secondary" onclick="clearResult()">🗑️ 清空</button>
  </div>
  <button class="btn btn-copy" id="copyBtn" onclick="copyText()">📋 一键复制</button>
  <div class="stats">
    <span>已生成: <b id="count">0</b> 条</span>
    <span>模板: 50+</span>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const templates=[
  "教练非常专业，蛙泳教学循序渐进，从基础动作到完整配合，进步很快！",
  "自由泳课程很棒，教练耐心纠正划水动作，现在游起来轻松多了！",
  "游泳私教课程物超所值，教练根据我的情况定制教学计划，效果很好！",
  "蛙泳课教练很细心，每个动作都讲解到位，零基础也能快速上手！",
  "自由泳呼吸技巧一直是难点，教练专门帮我练习，终于掌握了！",
  "仰泳课程很舒服，教练在旁保护很有安全感，学得很快！",
  "蝶泳课程强度适中，教练循序渐进教学，动作越来越标准！",
  "教练专业度高，四种泳姿都能教，根据需求灵活安排课程内容！",
  "游泳课不仅学会技能，还锻炼了身体，教练很有耐心！",
  "私教课程时间灵活，教练准时专业，学习进度很快！",
  "蛙泳腿动作一直不标准，教练反复示范纠正，现在好多了！",
  "自由泳手臂动作教学很细致，教练一对一指导，效果明显！",
  "游泳课让我从怕水到爱上游泳，教练的鼓励很重要！",
  "仰泳换气技巧掌握得很快，教练的方法很有效！",
  "蝶泳入门课程设计合理，教练不会急于求成，打基础很扎实！",
  "教练会根据我的体能调整课程强度，既不会太轻松也不会太累！",
  "游泳私教课程服务很好，教练专业又亲切，推荐！",
  "蛙泳配合节奏一直是问题，教练帮我找到感觉，现在游得很顺畅！",
  "自由泳转身技术教练教得很清楚，练习几次就掌握了！",
  "游泳课改善了我的体态，教练还教了拉伸放松方法！",
  "私教课程针对性强，教练发现我的问题并针对性训练，效果很好！",
  "仰泳漂浮练习教练保护得很好，克服了对水的恐惧！",
  "蝶泳波浪动作教练分解教学，一步步掌握，很有成就感！",
  "教练不仅教游泳，还讲解安全知识，很负责任！",
  "游泳课程让我增强了体质，教练的训练计划很科学！",
  "蛙泳提高课程帮助我改进技术，速度提升明显，教练很专业！",
  "自由泳长距离游进课程训练效果很好，体能明显提升！",
  "游泳私教课程体验很棒，教练会根据进度调整教学内容！",
  "仰泳课程让我学会了第二种泳姿，教练教学有方！",
  "蝶泳课程虽然难，但教练的鼓励让我坚持下来，进步很大！",
  "教练专业耐心，游泳技术提升很快，非常满意！",
  "蛙泳课程从不会到熟练，教练的付出功不可没！",
  "自由泳课程让我游泳效率提高很多，不再觉得累！",
  "游泳课是放松身心的好方式，教练营造的学习氛围很好！",
  "私教课程时间安排合理，教练从不迟到，很守时！",
  "仰泳转身技术教练教得很细致，练习几次就熟练了！",
  "蝶泳入门虽然挑战大，但教练的分解教学让学习变得容易！",
  "教练会根据天气和状态调整课程内容，很贴心！",
  "游泳课程让我掌握了自救技能，教练的安全教育很到位！",
  "蛙泳竞速技术提升课程帮助我在比赛中取得好成绩！",
  "自由泳课程改善了我的肩颈问题，教练还教了康复动作！",
  "游泳私教课程性价比高，教练专业负责，效果明显！",
  "仰泳课程让我享受仰面漂浮的放松感，教练指导很专业！",
  "蝶泳课程虽然累但很有成就感，教练的鼓励很重要！",
  "教练对学员很有耐心，不会的问题反复教直到会为止！",
  "游泳课程让我爱上了运动，教练的教学方式很有趣！",
  "蛙泳呼吸节奏掌握后游泳轻松多了，教练的方法很有效！",
  "自由泳课程让我能连续游1000米，体能提升明显！",
  "私教课程服务周到，教练还会分享游泳装备建议！",
  "仰泳课程让我学会了水中休息的方法，很实用！",
  "蝶泳课程让我挑战了自己，教练的专业指导很关键！"
];
let currentText='';
let count=0;
function generate(){
  const t=templates[Math.floor(Math.random()*templates.length)];
  currentText=t;
  document.getElementById('resultArea').innerHTML='<div class="result-text">'+t+'</div>';
  count++;
  document.getElementById('count').textContent=count;
}
function clearResult(){
  currentText='';
  document.getElementById('resultArea').innerHTML='<div class="placeholder">点击"生成好评"按钮开始</div>';
}
function copyText(){
  if(!currentText){showToast('请先生成好评');return;}
  navigator.clipboard.writeText(currentText).then(()=>{
    showToast('已复制到剪贴板！');
    document.getElementById('copyBtn').classList.add('copied');
    document.getElementById('copyBtn').textContent='✅ 已复制';
    setTimeout(()=>{
      document.getElementById('copyBtn').classList.remove('copied');
      document.getElementById('copyBtn').textContent='📋 一键复制';
    },2000);
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
